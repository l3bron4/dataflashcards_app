<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Analytics & dbt Mastery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getFirestore, collection, addDoc, serverTimestamp, 
            query, where, getDocs 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        // Import pour les confettis
        import confetti from 'https://cdn.skypack.dev/canvas-confetti';

        // --- CONFIGURATION FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyC80dJTJ-tzpkH7FTeZgi9RksyVaiUGq9M",
            authDomain: "dataflashcards.firebaseapp.com",
            projectId: "dataflashcards",
            storageBucket: "dataflashcards.firebasestorage.app",
            messagingSenderId: "190231819778",
            appId: "1:190231819778:web:64832f57614b20f6fd591b",
            measurementId: "G-TG7RX5WLS0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- DATASET ---
        const rawCards = [
            { cat: "SQL", recto: "Comment extraire l'année d'une date ?", verso: "EXTRACT(YEAR FROM ma_date) ou DATE_TRUNC(ma_date , YEAR)." },
            { cat: "SQL", recto: "Différence entre NULL et chaîne vide '' ?", verso: "NULL est l'absence de valeur. '' est une valeur existante mais vide." },
            { cat: "dbt", recto: "À quoi sert la commande dbt seed ?", verso: "À charger des fichiers CSV statiques dans la base de données." },
            { cat: "Analytics Method", recto: "Qu'est-ce que le framework AARRR ?", verso: "Acquisition, Activation, Retention, Referral, Revenue." },
            { cat: "Data Platform", recto: "Rôle d'un Data Warehouse ?", verso: "Stocker des données structurées pour l'analyse et le reporting." },
            { cat: "Business", recto: "Définition d'un KPI ?", verso: "Key Performance Indicator : mesure chiffrée d'un objectif." }
            // Ajoute tes 150+ questions ici...
        ];

        const allCards = rawCards.map((card, index) => ({ ...card, id: `q_${index}` }));

        // --- VARIABLES D'ÉTAT ---
        let userPseudo = "";
        let userWeights = {}; 
        let questions = [];  
        let currentIndex = 0;
        let progressChart = null;
        let currentCategory = 'Tous';

        // --- DÉMARRAGE ---
        window.startSession = async () => {
            const input = document.getElementById('pseudo-input').value;
            if (input.trim().length < 2) return alert("Veuillez entrer un pseudo valide.");
            
            userPseudo = input.trim();
            allCards.forEach(card => userWeights[card.id] = 3); // 3 = Nouveau

            try {
                const q = query(collection(db, "analytics_promo"), where("pseudo", "==", userPseudo));
                const querySnapshot = await getDocs(q);
                
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    // 1 = maîtrisé, 3.1 = à revoir (poids fort)
                    userWeights[data.questionId] = (data.resultat === "réussi") ? 1 : 3.1;
                });

                document.getElementById('welcome-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                
                initChart();
                filterCards('Tous'); 

            } catch (error) {
                console.error("Erreur Sync:", error);
                initChart();
                filterCards('Tous');
            }
        };

        // --- TIRAGE ET FILTRAGE ---
        window.filterCards = (category) => {
            currentCategory = category;
            currentIndex = 0;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const isSelected = btn.innerText === category;
                btn.classList.toggle('bg-indigo-600', isSelected);
                btn.classList.toggle('text-white', isSelected);
            });

            let baseCards = category === 'Tous' ? [...allCards] : allCards.filter(c => c.cat === category);
            
            let weightedPool = [];
            baseCards.forEach(card => {
                const w = userWeights[card.id] || 3;
                const loop = Math.floor(w); 
                for (let i = 0; i < loop; i++) weightedPool.push(card);
            });

            questions = [...new Set(shuffleArray(weightedPool))];
            updateUI();
        };

        // --- RÉPONSE ---
        window.markAs = async (known) => {
            if (questions.length === 0) return;
            const card = questions[currentIndex];
            
            userWeights[card.id] = known ? 1 : 3.1;

            try {
                await addDoc(collection(db, "analytics_promo"), {
                    pseudo: userPseudo,
                    questionId: card.id,
                    categorie: card.cat,
                    resultat: known ? "réussi" : "à revoir",
                    date: serverTimestamp()
                });
            } catch (e) { console.error(e); }

            updateUI();

            // Check Victoire
            const scope = currentCategory === 'Tous' ? allCards : allCards.filter(c => c.cat === currentCategory);
            const mastered = scope.filter(c => userWeights[c.id] === 1).length;
            if (mastered === scope.length && scope.length > 0) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }
            
            setTimeout(nextCard, 400);
        };

        // --- MISE À JOUR UI ---
        function updateUI() {
            if (questions.length === 0) return;
            const card = questions[currentIndex];
            
            document.getElementById('card-category').innerText = card.cat;
            document.getElementById('card-recto').innerText = card.recto;
            document.getElementById('card-verso').innerText = card.verso;
            document.getElementById('card-counter').innerText = `${currentIndex + 1} / ${questions.length}`;
            document.getElementById('flashcard').classList.remove('card-flipped');

            // Badge de statut
            const badge = document.getElementById('card-status');
            const weight = userWeights[card.id];
            if (weight === 1) {
                badge.innerText = "● Maîtrisé";
                badge.className = "text-[10px] font-bold text-teal-500 uppercase tracking-widest mb-2";
            } else if (weight === 3.1) {
                badge.innerText = "● À revoir";
                badge.className = "text-[10px] font-bold text-pink-500 uppercase tracking-widest mb-2";
            } else {
                badge.innerText = "● Nouveau";
                badge.className = "text-[10px] font-bold text-indigo-400 uppercase tracking-widest mb-2";
            }

            // Données du graphique (filtrées par catégorie active)
            const scope = currentCategory === 'Tous' ? allCards : allCards.filter(c => c.cat === currentCategory);
            const total = scope.length;
            const maîtrisé = scope.filter(c => userWeights[c.id] === 1).length;
            const àRevoir = scope.filter(c => userWeights[c.id] === 3.1).length;
            const jamaisVu = total - (maîtrisé + àRevoir);

            document.getElementById('progress-text').innerText = `${maîtrisé + àRevoir} / ${total}`;

            if (progressChart) {
                progressChart.data.datasets[0].data = [maîtrisé, àRevoir, jamaisVu];
                progressChart.update('none');
            }
        }

        window.nextCard = () => { currentIndex = (currentIndex + 1) % questions.length; updateUI(); };
        window.prevCard = () => { currentIndex = (currentIndex - 1 + questions.length) % questions.length; updateUI(); };
        window.flipCard = () => document.getElementById('flashcard').classList.toggle('card-flipped');

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initChart() {
            const ctx = document.getElementById('progressChart').getContext('2d');
            progressChart = new Chart(ctx,
